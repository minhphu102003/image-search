# Local development — infrastructure only
# API + Worker run locally via uv (see .env)
#
# Usage:
#   docker compose -f docker/docker-compose.local.yml up -d
#   uv run uvicorn image_search.adapters.input.app:app --host 0.0.0.0 --port 8000 --reload
#   uv run python -m image_search.adapters.input.ingest_worker

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: beekid
      POSTGRES_PASSWORD: beekid_secret
      POSTGRES_DB: beekid_ai
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beekid -d beekid_ai"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing myminio/images;
      exit 0;
      "

  migrate:
    build:
      context: ..
      target: migrate
    environment:
      IMAGE_SEARCH_DATABASE_URL: postgresql+asyncpg://beekid:beekid_secret@postgres:5432/beekid_ai
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  pgdata:
  redisdata:
  miniodata:
