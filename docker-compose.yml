services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: beekid
      POSTGRES_PASSWORD: beekid_secret
      POSTGRES_DB: beekid_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beekid -d beekid_ai"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing myminio/images;
      exit 0;
      "

  migrate:
    build:
      context: .
      target: migrate
    environment:
      IMAGE_SEARCH_DATABASE_URL: postgresql+asyncpg://beekid:beekid_secret@postgres:5432/beekid_ai
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    environment:
      IMAGE_SEARCH_DATABASE_URL: postgresql+asyncpg://beekid:beekid_secret@postgres:5432/beekid_ai
      IMAGE_SEARCH_REDIS_URL: redis://redis:6379
      IMAGE_SEARCH_IMAGE_SEARCH_HOST: "0.0.0.0"
      IMAGE_SEARCH_IMAGE_SEARCH_PORT: "8000"
      IMAGE_SEARCH_JINA_API_KEY: ${IMAGE_SEARCH_JINA_API_KEY:-}
      IMAGE_SEARCH_GEMINI_API_KEY: ${IMAGE_SEARCH_GEMINI_API_KEY:-}
      IMAGE_SEARCH_MINIO_ENDPOINT: minio:9000
      IMAGE_SEARCH_MINIO_ACCESS_KEY: minioadmin
      IMAGE_SEARCH_MINIO_SECRET_KEY: minioadmin
      IMAGE_SEARCH_MINIO_BUCKET: images
      IMAGE_SEARCH_LOG_FORMAT: json
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      target: worker
    environment:
      IMAGE_SEARCH_DATABASE_URL: postgresql+asyncpg://beekid:beekid_secret@postgres:5432/beekid_ai
      IMAGE_SEARCH_REDIS_URL: redis://redis:6379
      IMAGE_SEARCH_WORKER_ID: "1"
      IMAGE_SEARCH_JINA_API_KEY: ${IMAGE_SEARCH_JINA_API_KEY:-}
      IMAGE_SEARCH_CAPTION_ENABLED: "true"
      IMAGE_SEARCH_GEMINI_API_KEY: ${IMAGE_SEARCH_GEMINI_API_KEY:-}
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
  redisdata:
  miniodata:
